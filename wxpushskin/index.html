<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消息通知</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}

/* 背景 */

body{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

background:#f5f7fb;

position:relative;

overflow:hidden;

}

/* 柔和光斑背景 */

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:radial-gradient(circle,#a5b4fc55,transparent 70%);

top:-200px;
left:-200px;

filter:blur(80px);

}

body::after{

content:"";

position:absolute;

width:600px;
height:600px;

background:radial-gradient(circle,#67e8f955,transparent 70%);

bottom:-200px;
right:-200px;

filter:blur(80px);

}

/* 主卡片 */

.container{

width:100%;
max-width:720px;

background:white;

border-radius:18px;

padding:40px;

box-shadow:
0 20px 50px rgba(0,0,0,0.08);

border:1px solid #e5e7eb;

position:relative;

}

/* 标题 */

.title{

font-size:28px;

font-weight:600;

margin-bottom:30px;

color:#111;

display:flex;
align-items:center;
gap:10px;

}

.title::before{

content:"🔔";

font-size:24px;

}

/* 信息卡片 */

.info-card{

background:#fafafa;

border-radius:12px;

padding:20px;

margin-bottom:18px;

border:1px solid #e5e7eb;

transition:all .2s;

}

.info-card:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(0,0,0,0.05);

}

/* 标签 */

.info-label{

font-size:13px;

color:#6b7280;

margin-bottom:6px;

}

/* 内容 */

.info-content{

font-size:16px;

color:#111;

line-height:1.7;

white-space:pre-line;

word-break:break-word;

}

/* 时间 */

#date{

font-family:monospace;

color:#555;

}

/* Markdown */

.info-content code{

background:#111;

color:white;

padding:3px 6px;

border-radius:6px;

font-size:14px;

}

.info-content pre{

background:#111;

color:white;

padding:14px;

border-radius:10px;

overflow:auto;

margin-top:10px;

}

.info-content blockquote{

border-left:4px solid #6366f1;

padding-left:10px;

margin-top:10px;

color:#555;

}

/* 手机 */

@media(max-width:600px){

.container{
padding:28px;
}

.title{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title" id="title">消息通知</div>

<div class="info-card">
<div class="info-label">通知内容</div>
<div class="info-content" id="message">无告警信息</div>
</div>

<div class="info-card">
<div class="info-label">时间</div>
<div class="info-content" id="date">无时间信息</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

<script>

function getUrlParams(){
const urlParams=new URLSearchParams(window.location.search);

return{
title:urlParams.get('title')||'消息推送',
message:urlParams.get('message')||'无告警信息',
date:urlParams.get('date')||'无时间信息'
};
}

function renderMarkdown(){

const messageEl=document.getElementById('message');

if(messageEl && typeof marked!=='undefined'){

const markdownText=messageEl.textContent || messageEl.innerText;

messageEl.innerHTML=marked.parse(markdownText);

}

}

function fillContent(){

const params=getUrlParams();

document.getElementById('title').textContent=params.title;
document.getElementById('message').textContent=params.message;
document.getElementById('date').textContent=params.date;

renderMarkdown();

}

window.onload=function(){
fillContent();
}

</script>

</body>
</html>
